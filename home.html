<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniAvalia</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="logo">
      <img src="img/fotologo.png" alt="logo" width="150px">
    </div>

    <h1>UniAvalia</h1>

    <div class="subtitle">
      Avaliação de Projetos Acadêmicos
    </div>

    <div class="card">

      <h2 class="cor">Bem-vindo(a)</h2>

      <p>Faça login para avaliar os projetos</p>

      <button class="btn btn-google" onclick="loginGoogle()">
        Entrar com Google
      </button>

      <div class="divider">OU</div>

      <a href="logman.html">
        <button class="btn btn-manual" onclick="loginManual()">
          Login Manual
        </button>
      </a>

    </div>

    <div class="footer">
      © 2026 UniAvalia
    </div>

  </div>

  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      signInWithRedirect,
      getRedirectResult
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAIaLqJrLFDPPf2fjmlbMVDWR5aG8X3U9M",
      authDomain: "uniavalia-pi.firebaseapp.com",
      projectId: "uniavalia-pi",
      storageBucket: "uniavalia-pi.firebasestorage.app",
      messagingSenderId: "854909400217",
      appId: "1:854909400217:web:eac173179972148fdab408",
      measurementId: "G-1WT4LRH3NC"
    };

    const app = initializeApp(firebaseConfig);

    const auth = getAuth(app);

    const provider = new GoogleAuthProvider();

    window.loginGoogle = async function () {

      try {

        const result = await signInWithPopup(auth, provider);

        const user = result.user;

        console.log("Usuário logado:", user);

        localStorage.setItem(
          "nomeUsuario",
          user.displayName || "Usuário"
        );

        localStorage.setItem(
          "emailUsuario",
          user.email || ""
        );

        window.location.href = "pag2.html";

      } catch (error) {

        console.error("Erro no login:", error);

        alert("Erro ao fazer login com Google.");

      }
    };
  </script>

</body>

</html>
