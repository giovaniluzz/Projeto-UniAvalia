<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniAvalia</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="logo">
      <img src="img/fotologo.png" alt="logo" width="150px">
    </div>

    <h1>UniAvalia</h1>

    <div class="subtitle">
      Avaliação de Projetos Acadêmicos
    </div>

    <div class="card">

      <h2 class="cor">Bem-vindo(a)</h2>

      <p>Faça login para avaliar os projetos</p>

      <button class="btn btn-google" onclick="loginGoogle()">
        Entrar com Google
      </button>

      <div class="divider">OU</div>

      <a href="logman.html">
        <button class="btn btn-manual" onclick="loginManual()">
          Login Manual
        </button>
      </a>

    </div>

    <div class="footer">
      © 2026 UniAvalia
    </div>

  </div>

  <!-- FIREBASE -->
  <script type="module">

    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";

    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    // CONFIG FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyAIaLqJrLFDPPf2fjmlbMVDWR5aG8X3U9M",
      authDomain: "uniavalia-pi.firebaseapp.com",
      projectId: "uniavalia-pi",
      storageBucket: "uniavalia-pi.firebasestorage.app",
      messagingSenderId: "854909400217",
      appId: "1:854909400217:web:eac173179972148fdab408",
      measurementId: "G-1WT4LRH3NC"
    };

    // INICIALIZA FIREBASE
    const app = initializeApp(firebaseConfig);

    // AUTENTICAÇÃO
    const auth = getAuth(app);

    // LOGIN GOOGLE
    const provider = new GoogleAuthProvider();

    // FUNÇÃO LOGIN GOOGLE
    window.loginGoogle = async function () {

      try {

        const result = await signInWithPopup(auth, provider);

        const user = result.user;

        console.log(user);

        alert("Login realizado com sucesso! 🎉");
        
        if (loginGoogle == true){
          <button onclick="window.location.href='pag2html'">Login com Google</button>
        }
      } catch (error) {

        console.error(error);

        alert("Erro no login ❌");

      }

    }

    // LOGIN MANUAL
    window.loginManual = function () {

      const email = document.getElementById("email").value;

      if (email.trim() !== "") {

        alert("Login manual realizado! 🎉");
        <button ></button>

      } else {

        alert("Digite um email ❌");

      }
      
    }

  </script>

</body>

</html>
