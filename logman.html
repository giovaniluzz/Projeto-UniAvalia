<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UniAvalia</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="logo">
      <img
        src="img/fotologo.png"
        alt="logo"
        width="150px"
      >
    </div>

    <h1>UniAvalia</h1>

    <div class="subtitle">
      Avaliação de Projetos Acadêmicos
    </div>

    <div class="card">

      <h2 class="cor">
        Bem-vindo(a)
      </h2>

      <p>
        Faça login para avaliar os projetos
      </p>

      <!-- NOME -->
      <h5 class="txtesq">
        Digite seu nome
      </h5>

      <input
        class="input"
        type="text"
        id="nome"
        placeholder="Digite seu nome"
      >

      <br><br>

      <!-- EMAIL -->
      <h5 class="txtesq">
        Digite seu email
      </h5>

      <input
        class="input"
        type="email"
        id="email"
        placeholder="Digite seu email"
      >

      <br><br>

      <!-- BOTÃO LOGIN -->
      <button
        class="btn btn-google"
        onclick="loginManual()"
      >
        Entrar
      </button>

    </div>

    <div class="footer">
      © 2026 UniAvalia
    </div>

  </div>

  <!-- JAVASCRIPT -->
  <script>

    function loginManual() {

      // PEGA VALORES
      const nome =
        document.getElementById("nome").value;

      const email =
        document.getElementById("email").value;

      // VERIFICA CAMPOS
      if (
        nome.trim() !== "" &&
        email.trim() !== ""
      ) {

        // SALVA NOME
        localStorage.setItem(
          "nomeUsuario",
          nome
        );

        // SALVA EMAIL
        localStorage.setItem(
          "emailUsuario",
          email
        );

        // REDIRECIONA
        window.location.href = "pag2.html";

      } else {

        alert("Preencha todos os campos ❌");

      }

    }

  </script>

</body>

</html>
