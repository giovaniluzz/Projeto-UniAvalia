<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>UniAvalia</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <div class="logo">
      <img
        src="img/fotologo.png"
        alt="logo"
        width="150px"
      >
    </div>

    <h1>UniAvalia</h1>

    <div class="subtitle">
      Avaliação de Projetos Acadêmicos
    </div>

    <div class="card">

      <h2 class="cor">
        Bem-vindo(a)
      </h2>

      <p>
        Faça login para avaliar os projetos
      </p>

      <h5 class="txtesq">
        Digite seu nome
      </h5>

      <input
        class="input"
        type="text"
        id="nome"
        placeholder="Digite seu nome"
      >

      <br><br>

      <h5 class="txtesq">
        Digite seu email
      </h5>

      <input
        class="input"
        type="email"
        id="email"
        placeholder="Digite seu email"
      >

      <br><br>

      <button
        class="btn btn-google"
        onclick="loginManual()"
      >
        Entrar
      </button>

    </div>

    <div class="footer">
      © 2026 UniAvalia
    </div>

  </div>

  <script>

    function loginManual() {

      const nome = document.getElementById("nome").value.trim();
      const email = document.getElementById("email").value.trim();

      if (nome === "" || email === "") {
        alert("Preencha todos os campos!");
        return;
      }

      localStorage.setItem("nomeUsuario", nome);
      localStorage.setItem("emailUsuario", email);

      if (email === "admin@unipam.com") {
        window.location.href = "PainelAdmin.html";
      } else {
        window.location.href = "pag2.html";
      }

    }

  </script>

</body>

</html>
